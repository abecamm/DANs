<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAN PDF Extractor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary: #1e1e1e;
    --bg-hover: #2a2a2a;
    --border-color: #333;
    --border-light: #444;
    --text-primary: #f0f0f0;
    --text-secondary: #a0a0a0;
    --text-muted: #666;
    --accent: #00d632;
    --accent-hover: #00b82a;
    --accent-dim: rgba(0, 214, 50, 0.1);
    --warning: #f5a623;
    --warning-bg: rgba(245, 166, 35, 0.1);
    --error: #ff4757;
    --error-bg: rgba(255, 71, 87, 0.1);
    --info: #3b82f6;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .app-container { max-width: 1380px; margin: 0 auto; padding: 24px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { width: 42px; height: 42px; background: var(--accent); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 20px; color: #000; font-weight: 700; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .header-actions { display: flex; gap: 10px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; border-radius: var(--radius); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; white-space: nowrap; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #000; font-size: 14px; padding: 12px 28px; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 214, 50, 0.3); }
  .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
  .btn-secondary:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--border-light); }
  .btn-danger { background: var(--error-bg); color: var(--error); border: 1px solid rgba(255, 71, 87, 0.2); }
  .btn-danger:hover:not(:disabled) { background: rgba(255, 71, 87, 0.2); }
  .drop-zone { border: 2px dashed var(--border-color); border-radius: var(--radius-lg); padding: 48px 24px; text-align: center; transition: all 0.2s ease; cursor: pointer; background: var(--bg-secondary); position: relative; }
  .drop-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
  .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-dim); transform: scale(1.005); box-shadow: 0 0 30px rgba(0, 214, 50, 0.1); }
  .drop-zone-icon { font-size: 40px; color: var(--text-muted); margin-bottom: 16px; transition: color 0.2s; }
  .drop-zone:hover .drop-zone-icon, .drop-zone.drag-over .drop-zone-icon { color: var(--accent); }
  .drop-zone h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .drop-zone p { font-size: 13px; color: var(--text-secondary); }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .progress-container { margin-top: 20px; display: none; }
  .progress-container.visible { display: block; }
  .progress-bar-bg { height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
  .progress-text { font-size: 12px; color: var(--text-secondary); margin-top: 8px; text-align: center; }
  .stats-bar { display: none; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .stats-bar.visible { display: flex; }
  .stat-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .stat-badge.success { background: var(--accent-dim); color: var(--accent); }
  .stat-badge.warning { background: var(--warning-bg); color: var(--warning); }
  .stat-badge.error { background: var(--error-bg); color: var(--error); }
  .table-container { display: none; border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; margin-top: 8px; }
  .table-container.visible { display: block; }
  .table-scroll { overflow-x: auto; max-height: 480px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { position: sticky; top: 0; z-index: 10; }
  thead th { background: var(--bg-tertiary); padding: 10px 12px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border-color); transition: background 0.1s; }
  tbody tr:hover { background: var(--bg-hover); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 9px 12px; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
  .row-warning { background: var(--warning-bg) !important; }
  .row-error { background: var(--error-bg) !important; }
  .cell-filename { max-width: 180px; font-weight: 500; color: var(--text-primary); }
  .cell-amount { font-variant-numeric: tabular-nums; font-weight: 600; }
  .cell-debit { color: var(--error); }
  .cell-credit { color: var(--accent); }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-debit { background: var(--error-bg); color: var(--error); }
  .badge-credit { background: var(--accent-dim); color: var(--accent); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-ok { background: var(--accent-dim); color: var(--accent); }
  .badge-error { background: var(--error-bg); color: var(--error); }
  .copy-row-btn { background: none; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; }
  .copy-row-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .copy-row-btn.copied { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: var(--radius); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .toast.visible { transform: translateY(0); opacity: 1; }
  .toast-success { background: #0d3117; color: var(--accent); border: 1px solid rgba(0, 214, 50, 0.3); }
  .toast-error { background: #3d1117; color: var(--error); border: 1px solid rgba(255, 71, 87, 0.3); }
  .toast-warning { background: #3d2e0a; color: var(--warning); border: 1px solid rgba(245, 166, 35, 0.3); }
  .drop-zone.compact { padding: 16px 24px; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .drop-zone.compact .drop-zone-icon { font-size: 20px; margin-bottom: 0; }
  .drop-zone.compact h3 { font-size: 13px; margin-bottom: 0; }
  .drop-zone.compact p { display: none; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
  .loading-overlay { position: fixed; inset: 0; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-secondary); }
  .reason-cell { max-width: 240px; }
  .reason-review { color: var(--warning); font-weight: 600; }
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading PDF parser…</div>
</div>
<div class="app-container">
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="fa-solid fa-file-pdf" style="font-size:18px"></i></div>
      <div>
        <h1>DAN PDF Extractor</h1>
        <div class="subtitle">Drag & drop DAN PDFs to extract data for the spreadsheet</div>
      </div>
    </div>
    <div class="header-actions" id="headerActions" style="display:none">
      <button class="btn btn-primary" id="copyAllBtn" onclick="copyAllRows()">
        <i class="fa-solid fa-copy"></i> Copy All Rows
      </button>
      <button class="btn btn-danger" onclick="clearAll()">
        <i class="fa-solid fa-trash-can"></i> Clear All
      </button>
    </div>
  </div>
  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
    <h3>Drop DAN PDFs here</h3>
    <p>or click to select files • accepts multiple PDFs</p>
    <input type="file" id="fileInput" accept=".pdf" multiple>
  </div>
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">Processing…</div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="table-container" id="tableContainer">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>File</th>
            <th>Notice Date</th>
            <th>Deposit Date</th>
            <th>Reference #</th>
            <th>Cust Seq #</th>
            <th>Adj Amount</th>
            <th class="reason-cell">Reason</th>
            <th>Check #</th>
            <th>Type</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let extractedRows = [];
let pdfjsReady = false;

function loadPdfJs() {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = () => {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfjsReady = true;
      resolve();
    };
    script.onerror = () => reject(new Error('Failed to load PDF.js'));
    document.head.appendChild(script);
  });
}

(async function init() {
  try {
    await loadPdfJs();
    document.getElementById('loadingOverlay').classList.add('hidden');
    setTimeout(() => document.getElementById('loadingOverlay').remove(), 400);
  } catch(e) {
    document.querySelector('.loading-text').textContent = 'Failed to load PDF parser. Please refresh.';
    document.querySelector('.loading-spinner').style.display = 'none';
  }
})();

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

['dragenter','dragover'].forEach(evt => {
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
});
['dragleave','drop'].forEach(evt => {
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
});
dropZone.addEventListener('drop', e => {
  const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
  if (files.length) processFiles(files);
  else showToast('Please drop PDF files only.', 'error');
});
fileInput.addEventListener('change', e => {
  const files = Array.from(e.target.files).filter(f => f.type === 'application/pdf');
  if (files.length) processFiles(files);
  fileInput.value = '';
});

async function extractText(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + ' ';
  }
  return text;
}

const MONTHS = {'January':1,'February':2,'March':3,'April':4,'May':5,'June':6,'July':7,'August':8,'September':9,'October':10,'November':11,'December':12};

function formatMonthDate(match) {
  if (!match) return '';
  const parts = match[0].match(/(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{1,2}),\s+(\d{4})/);
  if (!parts) return '';
  return `${String(MONTHS[parts[1]]).padStart(2,'0')}/${String(parts[2]).padStart(2,'0')}/${parts[3]}`;
}

function mapReason(text, isDebit) {
  const t = text.toLowerCase();
  if (/same item was deposited|duplicate/i.test(t) && !/internal duplicate/i.test(t)) return 'Duplicate Presentment';
  if (/internal duplicate/i.test(t)) return 'Internal Duplicate Presentment';
  if (/(written amount|numerical amount|entered as)/i.test(t)) return isDebit ? 'Negative Adjustment - Amount Mismatch' : 'Positive Adjustment - Amount Mismatch';
  if (/image quality|image could not be processed/i.test(t)) return 'Image Quality';
  if (/non[- ]?negotiable/i.test(t)) return 'Non-Negotiable';
  if (/micr|unable to locate/i.test(t)) return 'MICR Error - Unable to Locate';
  if (/overlapping/i.test(t)) return 'Multiple Overlapping Items';
  if (/payer claim/i.test(t)) return 'Payer Claim';
  if (/operator error/i.test(t)) return 'Operator Error - Manual Reimbursement';
  return 'REVIEW MANUALLY';
}

function parseDAN(text, fileName) {
  const result = { fileName, noticeDate:'', depositDate:'', referenceNumber:'', customerSeqNum:'', adjustmentAmount:'', reason:'', checkNumber:'', adjustmentType:'', warnings:[], status:'ok' };

  const noticeDateMatch = text.match(/(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},\s+\d{4}/);
  result.noticeDate = formatMonthDate(noticeDateMatch);
  if (!result.noticeDate) result.warnings.push('Missing notice date');

  const depDateMatch = text.match(/Deposit\s+date:\s*(\d{2}\/\d{2}\/\d{4})/i);
  result.depositDate = depDateMatch ? depDateMatch[1] : '';
  if (!result.depositDate) result.warnings.push('Missing deposit date');

  const refMatch = text.match(/Reference\s*#:\s*(A-[\d]+)/i);
  result.referenceNumber = refMatch ? refMatch[1] : '';
  if (!result.referenceNumber) result.warnings.push('Missing reference #');

  const custSeqMatch = text.match(/Customer\s+sequence\s+number:\s*(\d+)/i);
  result.customerSeqNum = custSeqMatch ? custSeqMatch[1] : '';
  if (!result.customerSeqNum) result.warnings.push('Missing customer seq #');

  const adjMatch = text.match(/Adjustment\s+of\s+\$([\d,]+\.?\d*)/i);
  if (adjMatch) result.adjustmentAmount = adjMatch[1].replace(/,/g, '');
  else result.warnings.push('Missing adjustment amount');

  const isDebit = /deducted|deduct(?:ed|ing)?/i.test(text);
  const isCredit = /credited|added|credit(?:ed|ing)?/i.test(text);
  if (isDebit) result.adjustmentType = 'Debit';
  else if (isCredit) result.adjustmentType = 'Credit';
  else { result.adjustmentType = ''; result.warnings.push('Unknown adjustment type'); }

  let reasonSection = '';
  const reasonMatch = text.match(/Dear\s+BLOCK.*?:\s*([\s\S]*?)(?:What\s+you\s+need)/i);
  if (reasonMatch) reasonSection = reasonMatch[1];
  else reasonSection = text;
  result.reason = mapReason(reasonSection, isDebit);
  if (result.reason === 'REVIEW MANUALLY') result.warnings.push('Unrecognized reason');

  const checkMatch = text.match(/check\s*#\s*(\d+)/i) || text.match(/check\s+number\s*(\d+)/i);
  result.checkNumber = checkMatch ? checkMatch[1] : '';

  if (result.reason === 'REVIEW MANUALLY') result.status = 'review';
  else if (result.warnings.length > 0) result.status = 'warning';
  else result.status = 'ok';

  return result;
}

async function processFiles(files) {
  if (!pdfjsReady) { showToast('PDF parser is still loading. Please wait.', 'warning'); return; }
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  progressContainer.classList.add('visible');
  progressBar.style.width = '0%';
  progressText.textContent = `Processing 0 of ${files.length} PDFs…`;
  dropZone.classList.add('compact');
  let successCount = 0;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const text = await extractText(file);
      const row = parseDAN(text, file.name);
      extractedRows.push(row);
      successCount++;
    } catch(e) {
      console.error('Error parsing', file.name, e);
      extractedRows.push({ fileName: file.name, noticeDate:'', depositDate:'', referenceNumber:'', customerSeqNum:'', adjustmentAmount:'', reason:'', checkNumber:'', adjustmentType:'', warnings:['Failed to parse PDF: ' + e.message], status:'error' });
    }
    progressBar.style.width = Math.round(((i+1)/files.length)*100) + '%';
    progressText.textContent = `Processing ${i+1} of ${files.length} PDFs…`;
    await new Promise(r => setTimeout(r, 10));
  }
  progressText.textContent = `Done! ${successCount} of ${files.length} processed successfully.`;
  setTimeout(() => progressContainer.classList.remove('visible'), 2000);
  renderTable(); renderStats();
  document.getElementById('headerActions').style.display = 'flex';
  document.getElementById('tableContainer').classList.add('visible');
  document.getElementById('statsBar').classList.add('visible');
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  extractedRows.forEach((row, idx) => {
    const tr = document.createElement('tr');
    if (row.status === 'error') tr.classList.add('row-error');
    else if (row.reason === 'REVIEW MANUALLY') tr.classList.add('row-error');
    else if (row.warnings.length > 0) tr.classList.add('row-warning');
    const amountClass = row.adjustmentType === 'Debit' ? 'cell-debit' : 'cell-credit';
    const typeBadge = row.adjustmentType === 'Debit' ? '<span class="badge badge-debit"><i class="fa-solid fa-arrow-down" style="font-size:9px"></i> Debit</span>' : row.adjustmentType === 'Credit' ? '<span class="badge badge-credit"><i class="fa-solid fa-arrow-up" style="font-size:9px"></i> Credit</span>' : '<span class="badge badge-warning">Unknown</span>';
    let statusBadge;
    if (row.status === 'error') statusBadge = '<span class="badge badge-error"><i class="fa-solid fa-circle-xmark" style="font-size:10px"></i> Error</span>';
    else if (row.status === 'review') statusBadge = '<span class="badge badge-warning"><i class="fa-solid fa-triangle-exclamation" style="font-size:10px"></i> Review</span>';
    else if (row.warnings.length > 0) statusBadge = '<span class="badge badge-warning"><i class="fa-solid fa-triangle-exclamation" style="font-size:10px"></i> Warn</span>';
    else statusBadge = '<span class="badge badge-ok"><i class="fa-solid fa-circle-check" style="font-size:10px"></i> OK</span>';
    const reasonClass = row.reason === 'REVIEW MANUALLY' ? 'reason-review' : '';
    const amountDisplay = row.adjustmentAmount ? '$' + Number(row.adjustmentAmount).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '';
    tr.innerHTML = `
      <td class="cell-filename" title="${escapeHtml(row.fileName)}">${escapeHtml(row.fileName)}</td>
      <td>${escapeHtml(row.noticeDate)}</td>
      <td>${escapeHtml(row.depositDate)}</td>
      <td>${escapeHtml(row.referenceNumber)}</td>
      <td>${escapeHtml(row.customerSeqNum) || '<span style="color:var(--text-muted)">—</span>'}</td>
      <td class="cell-amount ${amountClass}">${amountDisplay}</td>
      <td class="reason-cell ${reasonClass}" title="${escapeHtml(row.reason)}">${escapeHtml(row.reason)}</td>
      <td>${escapeHtml(row.checkNumber) || '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${typeBadge}</td>
      <td title="${escapeHtml(row.warnings.join(', '))}">${statusBadge}</td>
      <td><button class="copy-row-btn" onclick="copySingleRow(${idx}, this)"><i class="fa-solid fa-copy"></i> Copy</button></td>`;
    tbody.appendChild(tr);
  });
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const total = extractedRows.length;
  const ok = extractedRows.filter(r => r.status === 'ok' && r.warnings.length === 0).length;
  const warnings = extractedRows.filter(r => r.warnings.length > 0 && r.status !== 'error').length;
  const errors = extractedRows.filter(r => r.status === 'error').length;
  const missingSeq = extractedRows.filter(r => !r.customerSeqNum && r.status !== 'error').length;
  const reviewManual = extractedRows.filter(r => r.reason === 'REVIEW MANUALLY').length;
  let html = `<span class="stat-badge success"><i class="fa-solid fa-circle-check"></i> ${ok} of ${total} OK</span>`;
  if (warnings > 0) html += `<span class="stat-badge warning"><i class="fa-solid fa-triangle-exclamation"></i> ${warnings} with warnings</span>`;
  if (errors > 0) html += `<span class="stat-badge error"><i class="fa-solid fa-circle-xmark"></i> ${errors} errors</span>`;
  if (missingSeq > 0) html += `<span class="stat-badge warning"><i class="fa-solid fa-hashtag"></i> ${missingSeq} missing Cust Seq #</span>`;
  if (reviewManual > 0) html += `<span class="stat-badge error"><i class="fa-solid fa-magnifying-glass"></i> ${reviewManual} need manual review</span>`;
  bar.innerHTML = html;
}

function buildTSVRow(row) {
  return [row.noticeDate, row.depositDate, row.referenceNumber, row.customerSeqNum, '', '', '', '', '', row.adjustmentAmount, row.reason, row.checkNumber, '', row.adjustmentType].join('\t');
}

async function copyAllRows() {
  if (extractedRows.length === 0) return;
  const tsv = extractedRows.map(buildTSVRow).join('\n');
  try { await navigator.clipboard.writeText(tsv); showToast(`Copied ${extractedRows.length} rows to clipboard!`, 'success'); }
  catch(e) { fallbackCopy(tsv); showToast(`Copied ${extractedRows.length} rows to clipboard!`, 'success'); }
}

async function copySingleRow(idx, btn) {
  const tsv = buildTSVRow(extractedRows[idx]);
  try { await navigator.clipboard.writeText(tsv); } catch(e) { fallbackCopy(tsv); }
  btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
  btn.classList.add('copied');
  setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copy'; btn.classList.remove('copied'); }, 1500);
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
}

function clearAll() {
  extractedRows = [];
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('tableContainer').classList.remove('visible');
  document.getElementById('statsBar').classList.remove('visible');
  document.getElementById('statsBar').innerHTML = '';
  document.getElementById('headerActions').style.display = 'none';
  document.getElementById('progressContainer').classList.remove('visible');
  dropZone.classList.remove('compact');
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  const icons = { success:'fa-circle-check', error:'fa-circle-xmark', warning:'fa-triangle-exclamation' };
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<i class="fa-solid ${icons[type]||icons.success}"></i> ${escapeHtml(message)}`;
  void toast.offsetWidth;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
</script>
</body>
</html>
